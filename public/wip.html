<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Vault Blob Edition</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="wrap">

  <h1>Movie Vault</h1>

  <div class="topbar">
    <input id="search" placeholder="Search movies...">
  </div>

  <div class="stats">
    Collection Value:
    <strong id="collectionValue">0 kr</strong>
  </div>

  <div class="addbox">
    <h2>Add Movie</h2>

    <input id="title" placeholder="Movie title">
    <input id="section" value="UNSORTED" placeholder="Section">
    <input id="format" value="Blu-ray" placeholder="Format">
    <input id="price" type="number" placeholder="Price">

    <button onclick="addMovie()">Add Movie</button>
  </div>

  <div id="movies"></div>

</div>

<script src="/app.js"></script>

</body>
</html>
